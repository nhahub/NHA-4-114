# ── Smart Vision System — Docker Compose (Production) ─────────────────────────
#
# Differences from development:
#   - No code volume mounts (image is the source of truth)
#   - No --reload flag
#   - 4 uvicorn workers
#   - restart: always on every service
#   - Nginx reverse proxy on ports 80/443
#   - Credentials read from .env (never hardcoded)
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d

services:

  postgres:
    image: postgres:16-alpine
    container_name: svs_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: svs_redis
    restart: always
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: svs_backend
    restart: always
    env_file: .env
    volumes:
      - ./models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      uvicorn backend.app.main:app
      --host 0.0.0.0
      --port 3000
      --workers 4

  celery_cameras:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: svs_celery_cameras
    restart: always
    env_file: .env
    volumes:
      - ./models:/app/models
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: >
      celery -A backend.app.workers.celery_app worker
      --loglevel=warning
      --concurrency=8
      -Q cameras

  celery_alerts:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: svs_celery_alerts
    restart: always
    env_file: .env
    volumes:
      - ./models:/app/models
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    # Alert persistence worker runs directly as a long-lived asyncio process. (C6)
    command: >
      python -c "import asyncio; from backend.app.workers.alert_worker import run_alert_worker; asyncio.run(run_alert_worker())"

  nginx:
    image: nginx:alpine
    container_name: svs_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
