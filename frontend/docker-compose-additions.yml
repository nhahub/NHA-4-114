# ─────────────────────────────────────────────────────────────────────────────
# ADD THIS TO YOUR EXISTING docker-compose.yml
# These are the new services to append under `services:`
# ─────────────────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://backend:8000
        NEXT_PUBLIC_WS_URL: ws://backend:8000
    container_name: svs_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    networks:
      - svs_network

