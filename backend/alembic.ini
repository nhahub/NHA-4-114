# Alembic config baked into the backend image (build context = ./backend).
# Copied to /alembic.ini by the Dockerfile so `alembic upgrade head` runs from
# the default container WORKDIR (/) with no -c flag.
[alembic]
# Absolute so it resolves regardless of the current working directory.
script_location = /backend/app/db/migrations
# Ensure `from backend.app...` imports resolve even when launched via the
# alembic console script (which does not add CWD to sys.path).
prepend_sys_path = /
# Placeholder — env.py overrides this with settings.POSTGRES_URL at runtime.
sqlalchemy.url = driver://user:pass@localhost/dbname

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
