# alembic.ini
# ─────────────────────────────────────────────────────────────────────────────
# Alembic configuration for the Smart Vision System.
#
# The database URL is NOT set here — it is read from the application config
# inside env.py so we never hard-code credentials in a committed file.
# ─────────────────────────────────────────────────────────────────────────────

[alembic]
# Path to migration scripts — relative to the location of this file.
script_location = backend/app/db/migrations

# SQLAlchemy URL placeholder. env.py overrides this at runtime.
sqlalchemy.url = driver://user:pass@localhost/dbname

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
