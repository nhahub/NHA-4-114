# ── Smart Vision System — Nginx Reverse Proxy ─────────────────────────────────
#
# Routes all traffic through a single entry point:
#   /api/*      → FastAPI backend (HTTP)
#   /ws/*       → FastAPI backend (WebSocket upgrade)
#   /docs       → FastAPI Swagger UI
#   /           → Next.js frontend (when added in Phase 3)

worker_processes auto;

events {
    worker_connections 1024;
}

http {

    # ── Upstream services ────────────────────────────────────────────────────────
    upstream backend {
        server backend:3000;
    }

    # ── HTTP server ──────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # ── WebSocket support ───────────────────────────────────────────────────
        # Required for /ws/* endpoints — Nginx must forward the Upgrade header.
        location /ws/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_read_timeout 86400s;   # keep WS alive for 24h
            proxy_send_timeout 86400s;
        }

        # ── REST API + Swagger docs ─────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        location /docs {
            proxy_pass         http://backend;
            proxy_set_header   Host $host;
        }

        location /redoc {
            proxy_pass         http://backend;
            proxy_set_header   Host $host;
        }

        location /openapi.json {
            proxy_pass         http://backend;
            proxy_set_header   Host $host;
        }

        # ── Health check (used by load balancers) ───────────────────────────────
        location /health {
            proxy_pass         http://backend/api/v1/health;
            proxy_set_header   Host $host;
            access_log         off;
        }

        # ── Frontend (Phase 3 — uncomment when Next.js is added) ───────────────
        # location / {
        #     proxy_pass http://frontend:3000;
        #     proxy_set_header Host $host;
        # }
    }
}
